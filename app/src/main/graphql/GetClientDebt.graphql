query GetClientDebt($clientId: Int!){
    clientWithDebt(clientId:$clientId){

        id
        code
        names
        phone
        documentType
        documentTypeReadable
        documentNumber
        observation
        isEnabled
        typeTradeId
        typeTradeName

        creditLine
        debt
        isBlocked
        isSuspended
        isObserved
    }
}