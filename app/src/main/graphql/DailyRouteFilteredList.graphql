query DailyRouteFilteredList($userId: Int!, $truckId: Int!, $visitDate: String!, $searchQuery: String!, $searchBy: String!){
    dailyRoutesByCriteria(userId:$userId, gangId:$truckId, visitDate:$visitDate, searchQuery:$searchQuery, searchBy:$searchBy){
        routeId
        routeDailyRouteId
        routePersonId
        routePersonCode
        routePersonNames
        routePersonPhone
        routePersonDocumentTypeReadable
        routePersonDocumentNumber
        routePersonIsBlocked
        routePersonIsSuspended
        routePersonIsObserved
        routeAddressId
        routeAddress
        routeDayId
        routeDayName
        routeDayColor
        routePinCode
        routeLatitude
        routeLongitude
        routeDistrictId
        routeDistrictName
        routeStatus
        routeStatusDisplay
        routeObservation
        routeDate
        routeType
        routeOperationId
        routeDailyRouteIsEnabled
        routePersonTypeTradeId
        routePersonTypeTradeName
        routePersonBusinessTypeName
    }
}